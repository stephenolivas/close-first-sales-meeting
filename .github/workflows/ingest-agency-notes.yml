name: Ingest Agency Notes

on:
  schedule:
    - cron: '40 * * * *'   # hourly at :40, offset off the other jobs (:00, :05, :15, :20, :30, :45)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (log what would happen, no writes)"
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests gspread google-auth

      - name: Ingest agency notes
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          AGENCY_NOTES_SHEET_ID: ${{ vars.AGENCY_NOTES_SHEET_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python ingest_agency_notes.py --dry-run
          else
            python ingest_agency_notes.py
          fi
