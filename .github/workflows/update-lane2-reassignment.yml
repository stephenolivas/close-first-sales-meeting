name: Lane 2 Daily Reassignment (Round Robin)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — read & report only, no writes, no tasks'
        type: boolean
        default: false
      skip_tasks:
        description: 'Update fields & opps but create no tasks'
        type: boolean
        default: false
  schedule:
    # Weekdays only. Two crons bracket DST so the run lands at 8am Pacific
    # year-round (15:00 UTC = 8am PDT, 16:00 UTC = 8am PST). The "off" hour run
    # is a near no-op: reassigned leads have already dropped off the Smart Views,
    # so it only sweeps up any stragglers. cron-job.org is the precise primary
    # trigger; these are the fallback.
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'

permissions:
  contents: write   # needed to commit the updated round-robin state cache

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run Lane 2 reassignment
        run: python update_lane2_reassignment.py
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          DRY_RUN:    ${{ inputs.dry_run }}
          SKIP_TASKS: ${{ inputs.skip_tasks }}

      - name: Commit updated state cache
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lane2_state_cache.json
          git diff --staged --quiet || git commit -m "Update Lane 2 round-robin state cache [skip ci]"
          git push
