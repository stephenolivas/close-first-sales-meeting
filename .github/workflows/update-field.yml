name: Update First Sales Meeting Field

on:
  workflow_dispatch:
  schedule:
    # Backup schedule — cron-job.org is the primary trigger (hits workflow_dispatch via API)
    - cron: '*/30 * * * *'

permissions:
  contents: write  # Required for checkpoint commits

jobs:
  update-field:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Full backfill needs ~80 min; 120 gives plenty of headroom

    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN allows the script to git push checkpoints back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run field updater
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python3 -u update_field.py
