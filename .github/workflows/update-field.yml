name: Update First Sales Meeting Field

on:
  workflow_dispatch:
  # Backup: also runs on a schedule in case cron-job.org misses a trigger
  # cron-job.org is the primary trigger (hits workflow_dispatch via API)
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-field:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run field updater
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python3 -u update_field.py
