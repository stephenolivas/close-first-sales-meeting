name: Diagnose Close Query Format

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python diagnose_query.py
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
