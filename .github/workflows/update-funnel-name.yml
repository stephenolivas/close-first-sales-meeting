name: Update Funnel Name (Reactivation Scrapers)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report only, make zero API writes"
        type: boolean
        default: false
  schedule:
    # Hourly at :20 — offset off update_field.py (:00/:30),
    # update_followups.py (:15/:45) and update_sales_cycle.py (:05)
    # to avoid Close API contention.
    - cron: '20 * * * *'

jobs:
  update-funnel-name:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run funnel-name updater
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python update_funnel_name.py --dry-run
          else
            python update_funnel_name.py
          fi
