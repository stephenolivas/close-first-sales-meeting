name: Reassign Prior-Day Lost Deals to John Kirk

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no writes)'
        type: boolean
        default: false
      skip_tasks:
        description: 'Skip task creation (still updates lead fields)'
        type: boolean
        default: false
  schedule:
    - cron: '0 14 * * 1-5'  # 6am PST / 7am PDT, Mon-Fri only

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python update_lost_deals.py
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SKIP_TASKS: ${{ inputs.skip_tasks || 'false' }}
